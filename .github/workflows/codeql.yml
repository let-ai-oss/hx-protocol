name: CodeQL

# MVP security gate (HX OSS Readiness Plan, Part 4.2): GitHub-native static
# analysis with the security-extended query suite. Third-party actions are
# pinned to a full commit SHA (tag recorded in the trailing comment).

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1" # weekly (Mon 07:00 UTC)

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the code-scanning dashboard
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
          queries: security-extended
          # dist/ is committed but compiled from src/; scanning both would
          # double-report. config-file excludes dist so only source is analyzed.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
